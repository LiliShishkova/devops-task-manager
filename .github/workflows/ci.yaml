name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: yorizova/backend
  FRONTEND_IMAGE: yorizova/frontend

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/devops-task-manager/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/devops-task-manager
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend/devops-task-manager
        run: npm test

      - name: Build frontend bundle
        working-directory: frontend/devops-task-manager
        run: npm run build

  manifest-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client --validate=false -f k8s

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-test
      - manifest-validate
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set tag
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:$TAG -t $BACKEND_IMAGE:latest ./backend

      - name: Push backend image
        run: |
          docker push $BACKEND_IMAGE:$TAG
          docker push $BACKEND_IMAGE:latest

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:$TAG -t $FRONTEND_IMAGE:latest ./frontend/devops-task-manager

      - name: Push frontend image
        run: |
          docker push $FRONTEND_IMAGE:$TAG
          docker push $FRONTEND_IMAGE:latest

      - name: Discord success notification
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"CI SUCCESS - Tests, manifests, and Docker publishes passed (${GITHUB_SHA::7})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Discord failure notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"CI FAILED - One of the validation, test, or image stages broke (${GITHUB_SHA::7})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
