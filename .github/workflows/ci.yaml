name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build backend
        run: docker build -t yorizova/backend ./backend

      - name: Push backend
        run: docker push yorizova/backend

      - name: Build frontend
        run: docker build -t yorizova/frontend ./frontend

      - name: Push frontend
        run: docker push yorizova/frontend
