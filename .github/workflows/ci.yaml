name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Set tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build backend
        run: docker build -t yorizova/backend:${{ env.TAG }} ./backend

      - name: Push backend
        run: docker push yorizova/backend:${{ env.TAG }}

      - name: Build frontend
        run: |
          cd frontend/devops-task-manager
          docker build -t yorizova/frontend:${{ env.TAG }} .

      - name: Push frontend
        run: docker push yorizova/frontend:${{ env.TAG }}

      # =========================
      # DISCORD SUCCESS NOTIFICATION
      # =========================
      - name: Discord success notification
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"CI SUCCESS ✅ - Build passed and images pushed (${GITHUB_SHA::7})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      # =========================
      # DISCORD FAILURE NOTIFICATION
      # =========================
      - name: Discord failure notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"CI FAILED ❌ - Something broke in pipeline (${GITHUB_SHA::7})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
