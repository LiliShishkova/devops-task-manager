apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      receiver: discord
    receivers:
      - name: discord
        webhook_configs:
          - url: ${DISCORD_WEBHOOK_URL}
            send_resolved: true
