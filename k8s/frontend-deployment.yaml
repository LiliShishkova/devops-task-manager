apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: yorizova/frontend:latest
        env:
        - name: REACT_APP_BACKEND_URL
          value: "http://backend:3000"
        ports:
        - containerPort: 80
