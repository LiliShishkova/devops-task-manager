apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-task-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LiliShishkova/devops-task-manager.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
